<section class="content">
  <div class="content-block">
    @for (breadscrum of breadscrums; track breadscrum) {
    <div class="block-header">
      <!-- breadcrumb -->
      <app-breadcrumb [title]="breadscrum.title" [items]="breadscrum.items" [active_item]="breadscrum.active">
      </app-breadcrumb>
    </div>
    }
    <div class="container mt-4">
  <h2>Add New Course</h2>
  <form [formGroup]="courseForm" (ngSubmit)="submitForm()">
    
    <div class="form-group mb-3">
      <label>Course Name</label>
      <input type="text" class="form-control" formControlName="courseName" />
    </div>

    <div class="form-group mb-3">
      <label>Department</label>
      <input type="text" class="form-control" formControlName="department" />
    </div>

    <div class="form-group mb-3">
      <label>Course Type</label>
      <select class="form-control" formControlName="courseType">
        <option value="UG">UG</option>
        <option value="PG">PG</option>
        <option value="Diploma">Diploma</option>
        <option value="Certificate">Certificate</option>
      </select>
    </div>

    <div class="form-group mb-3">
      <label>Duration</label>
      <input type="text" class="form-control" formControlName="duration" placeholder="e.g., 3 Years" />
    </div>

    <div class="form-group mb-3">
      <label>Intake Capacity</label>
      <input type="number" class="form-control" formControlName="intake" />
    </div>

    <div class="form-group mb-3">
      <label>Eligibility</label>
      <input type="text" class="form-control" formControlName="eligibility" />
    </div>

    <div class="form-group mb-3">
      <label>Description</label>
      <textarea class="form-control" rows="4" formControlName="description"></textarea>
    </div>

    <div class="form-group mb-3">
      <label>Status</label>
      <select class="form-control" formControlName="status">
        <option value="Active">Active</option>
        <option value="Inactive">Inactive</option>
      </select>
    </div>

    <button type="submit" class="btn btn-primary" [disabled]="!courseForm.valid">Submit</button>
  </form>
</div>









     </div>
</section>
