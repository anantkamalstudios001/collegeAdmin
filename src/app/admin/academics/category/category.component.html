<section class="content">
  <div class="content-block">
    @for (breadscrum of breadscrums; track breadscrum) {
    <div class="block-header">
      <!-- breadcrumb -->
      <app-breadcrumb [title]="breadscrum.title" [items]="breadscrum.items" [active_item]="breadscrum.active">
      </app-breadcrumb>
    </div>
    }

    <div class="container mt-4">
  <h2>Add Academic Category</h2>

  <form [formGroup]="categoryForm" (ngSubmit)="submitForm()">
    <div class="form-group mb-3">
      <label>Category Name</label>
      <input type="text" class="form-control" formControlName="name" placeholder="e.g., Undergraduate" />
    </div>

    <div class="form-group mb-3">
      <label>Description</label>
      <textarea class="form-control" rows="3" formControlName="description" placeholder="Short description of the category"></textarea>
    </div>

    <div class="form-group mb-3">
      <label>Status</label>
      <select class="form-control" formControlName="status">
        <option value="Active">Active</option>
        <option value="Inactive">Inactive</option>
      </select>
    </div>

    <div class="form-group mb-3">
      <label>Display Order</label>
      <input type="number" class="form-control" formControlName="displayOrder" />
    </div>

    <button type="submit" class="btn btn-primary" [disabled]="!categoryForm.valid">Submit</button>
  </form>
</div>







     </div>
</section>
